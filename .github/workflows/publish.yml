name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone path dependencies
        run: bash scripts/setup-deps.sh
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (skip if version already on crates.io)
        run: |
          META=$(cargo metadata --no-deps --format-version 1)
          NAME=$(echo "$META" | jq -r '.packages[0].name')
          VERSION=$(echo "$META" | jq -r '.packages[0].version')
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$CODE" = "200" ]; then
            echo "Version $NAME@$VERSION already published on crates.io, skipping."
          else
            cargo publish
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
